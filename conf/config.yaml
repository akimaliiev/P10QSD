# Global configuration
seed: 42

# Data configuration
data:
  tickers: ["AAPL", "MSFT", "GOOGL"]
  start_date: "2015-01-01"
  end_date: "2024-12-31"
  raw_dir: "data/raw"
  processed_dir: "data/processed"

# Feature configuration
features:
  prediction_horizon: 5 # Number of days to predict ahead
  window_sizes: [5, 10, 20, 50] # For rolling features

# Model configuration
model:
  type: "random_forest" # Options: logistic_regression, random_forest, lightgbm
  params:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5

# Training configuration
training:
  test_size: 0.2
  split_type: "time_series" # Options: time_series, random (strict NO for this project)
